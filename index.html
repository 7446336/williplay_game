<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arena Shooter: Epic Edition</title>
<style>
body{margin:0;background:#111;overflow:hidden;font-family:Arial;}
canvas{display:block;margin:auto;background:#222;}
#ui{position:absolute;top:10px;left:10px;color:white;}
#healthbar{width:200px;height:20px;border:2px solid white;margin-bottom:5px;}
#healthfill{height:100%;background:red;width:100%;}
#levelComplete{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:white;font-size:40px;display:none;}
#deathScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white;display:none;}
#abilitySelect{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);display:none;color:white;text-align:center;}
button{padding:10px 15px;margin:5px;font-size:16px;}
</style>
</head>
<body>

<canvas id="game" width="900" height="600"></canvas>

<div id="ui">
<div id="healthbar"><div id="healthfill"></div></div>
<div id="score">Score: 0</div>
<div id="level">Level: 1</div>
</div>

<div id="levelComplete">LEVEL COMPLETE</div>

<div id="abilitySelect">
<h2>Choose Ability</h2>
<div id="abilityButtons"></div>
</div>

<div id="deathScreen">
<h1>You Died</h1>
<input id="nameInput" placeholder="Name 3-15 chars"><br><br>
<button onclick="saveScore()">Save Score</button>
<button onclick="skipName()">No</button>
<div id="afterButtons" style="display:none">
<button onclick="restart()">Restart</button>
<button onclick="showLeaderboard()">Leaderboards</button>
</div>
<div id="leaderboard"></div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let keys={}, mouseX=0, mouseY=0, mouseDown=false;
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove",e=>{
    let rect=canvas.getBoundingClientRect();
    mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top;
});
canvas.addEventListener("mousedown",e=>{
    mouseDown=true;
    if(!autoShootInterval) autoShootInterval=setInterval(shootBullet,100); // auto 5/sec
});
canvas.addEventListener("mouseup",e=>{
    mouseDown=false;
    clearInterval(autoShootInterval);
    autoShootInterval=null;
});

let player={x:450,y:300,r:18,speed:3,health:100,maxHealth:100,damage:10,score:0,effects:[]};
let bullets=[],enemies=[],spikes=[],particles=[];
let level=1,waveSize=5,enemyHPMultiplier=1;
let shootCooldown=100,shootTimer=0,canShoot=true;
let choosingAbility=false;
let autoShootInterval=null;
let waiting=false;

// 50 abilities (10 per rarity)
const abilities=[
{name:"Extra Damage", rarity:"Normal", desc:"+3 Damage", effect:()=>player.damage+=3, color:"white"},
{name:"Speed Boost", rarity:"Normal", desc:"+1 Speed", effect:()=>player.speed=Math.min(player.speed+1,20), color:"white"},
{name:"Extra Health", rarity:"Normal", desc:"+10 Max Health", effect:()=>{player.maxHealth+=10; player.health+=10}, color:"white"},
{name:"Burning Bullets", rarity:"Normal", desc:"Bullets burn enemies", effect:()=>player.effects.push("burn"), color:"white"},
{name:"Slow Enemies", rarity:"Normal", desc:"Enemies slow 3 sec", effect:()=>player.effects.push("slow"), color:"white"},
{name:"Extra Shield", rarity:"Normal", desc:"Damage resist +5", effect:()=>{}, color:"white"},
{name:"Rapid Fire", rarity:"Normal", desc:"Shoot faster", effect:()=>shootCooldown=50, color:"white"},
{name:"Jump Boost", rarity:"Normal", desc:"Jump higher", effect:()=>{}, color:"white"},
{name:"Healing Touch", rarity:"Normal", desc:"Heal +20", effect:()=>player.health=Math.min(player.maxHealth,player.health+20), color:"white"},
{name:"Critical Strike", rarity:"Normal", desc:"10% crit", effect:()=>player.effects.push("crit"), color:"white"},

// Rare
{name:"Rare Damage", rarity:"Rare", desc:"+6 Damage", effect:()=>player.damage+=6, color:"orange"},
{name:"Rare Speed", rarity:"Rare", desc:"+2 Speed", effect:()=>player.speed=Math.min(player.speed+2,20), color:"orange"},
{name:"Rare Health", rarity:"Rare", desc:"+20 Max Health", effect:()=>{player.maxHealth+=20; player.health+=20}, color:"orange"},
{name:"Rare Burn", rarity:"Rare", desc:"Bullets deal 10% burn", effect:()=>player.effects.push("burn10"), color:"orange"},
{name:"Rare Slow", rarity:"Rare", desc:"Enemies slow 5 sec", effect:()=>player.effects.push("slow5"), color:"orange"},
{name:"Rare Shield", rarity:"Rare", desc:"+10 Damage resist", effect:()=>{}, color:"orange"},
{name:"Rare Rapid", rarity:"Rare", desc:"Shoot 2x faster", effect:()=>shootCooldown=30, color:"orange"},
{name:"Rare Healing", rarity:"Rare", desc:"+50 Health", effect:()=>player.health=Math.min(player.maxHealth,player.health+50), color:"orange"},
{name:"Rare Crit", rarity:"Rare", desc:"20% crit", effect:()=>player.effects.push("crit20"), color:"orange"},
{name:"Rare Blast", rarity:"Rare", desc:"Bullets explosive", effect:()=>player.effects.push("explosive"), color:"orange"},

// Mystic
{name:"Mystic Damage", rarity:"Mystic", desc:"+12 Damage", effect:()=>player.damage+=12, color:"purple"},
{name:"Mystic Speed", rarity:"Mystic", desc:"+3 Speed", effect:()=>player.speed=Math.min(player.speed+3,20), color:"purple"},
{name:"Mystic Health", rarity:"Mystic", desc:"+40 Max Health", effect:()=>{player.maxHealth+=40; player.health+=40}, color:"purple"},
{name:"Mystic Burn", rarity:"Mystic", desc:"Bullets burn 20%", effect:()=>player.effects.push("burn20"), color:"purple"},
{name:"Mystic Slow", rarity:"Mystic", desc:"Enemies slow 7 sec", effect:()=>player.effects.push("slow7"), color:"purple"},
{name:"Mystic Shield", rarity:"Mystic", desc:"+20 Damage resist", effect:()=>{}, color:"purple"},
{name:"Mystic Rapid", rarity:"Mystic", desc:"Shoot 3x faster", effect:()=>shootCooldown=20, color:"purple"},
{name:"Mystic Healing", rarity:"Mystic", desc:"+100 Health", effect:()=>player.health=Math.min(player.maxHealth,player.health+100), color:"purple"},
{name:"Mystic Crit", rarity:"Mystic", desc:"30% crit", effect:()=>player.effects.push("crit30"), color:"purple"},
{name:"Mystic Blast", rarity:"Mystic", desc:"Bullets explosive 2x", effect:()=>player.effects.push("explosive2"), color:"purple"},

// Divine
{name:"Divine Damage", rarity:"Divine", desc:"+25 Damage", effect:()=>player.damage+=25, color:"cyan"},
{name:"Divine Speed", rarity:"Divine", desc:"+5 Speed", effect:()=>player.speed=Math.min(player.speed+5,20), color:"cyan"},
{name:"Divine Health", rarity:"Divine", desc:"+100 Max Health", effect:()=>{player.maxHealth+=100; player.health+=100}, color:"cyan"},
{name:"Divine Burn", rarity:"Divine", desc:"Bullets burn 50%", effect:()=>player.effects.push("burn50"), color:"cyan"},
{name:"Divine Slow", rarity:"Divine", desc:"Enemies slow 10 sec", effect:()=>player.effects.push("slow10"), color:"cyan"},
{name:"Divine Shield", rarity:"Divine", desc:"+50 Damage resist", effect:()=>{}, color:"cyan"},
{name:"Divine Rapid", rarity:"Divine", desc:"Shoot 5x faster", effect:()=>shootCooldown=10, color:"cyan"},
{name:"Divine Healing", rarity:"Divine", desc:"+200 Health", effect:()=>player.health=Math.min(player.maxHealth,player.health+200), color:"cyan"},
{name:"Divine Crit", rarity:"Divine", desc:"50% crit", effect:()=>player.effects.push("crit50"), color:"cyan"},
{name:"Divine Blast", rarity:"Divine", desc:"Bullets explosive 5x", effect:()=>player.effects.push("explosive5"), color:"cyan"}
];

// SELECT ABILITY
function chooseAbility(){
    choosingAbility=true;
    const abilityDiv=document.getElementById("abilitySelect");
    const buttonsDiv=document.getElementById("abilityButtons");
    abilityDiv.style.display="block";
    buttonsDiv.innerHTML="";
    function getAbilityByRarity(){
        let r=Math.random()*100;
        if(r<55) return abilities.filter(a=>a.rarity==="Normal")[Math.floor(Math.random()*10)];
        if(r<85) return abilities.filter(a=>a.rarity==="Rare")[Math.floor(Math.random()*10)];
        if(r<95) return abilities.filter(a=>a.rarity==="Mystic")[Math.floor(Math.random()*10)];
        return abilities.filter(a=>a.rarity==="Divine")[Math.floor(Math.random()*10)];
    }
    let options=[getAbilityByRarity(),getAbilityByRarity(),getAbilityByRarity()];
    options.forEach(a=>{
        let btn=document.createElement("button");
        btn.textContent=`${a.rarity} - ${a.name}: ${a.desc}`;
        btn.style.color=a.color;
        btn.onclick=()=>{
            a.effect();
            abilityDiv.style.display="none";
            choosingAbility=false;
        };
        buttonsDiv.appendChild(btn);
    });
}

// SPAWN ENEMY/BOSS
function spawnEnemy(boss=false){
    let x=Math.random()*canvas.width;
    let y=Math.random()*canvas.height;
    let hp=(30+level*5)*enemyHPMultiplier;
    let r=15,speed=1.5;
    let spikeTimer=0;
    if(boss){hp*=60;r=40; speed=1; spikeTimer=90;}
    enemies.push({x,y,hp,r,speed,boss,originalSpeed:speed,burnTimer:0,slowTimer:0,spikeTimer});
}

// SPAWN WAVE
function spawnWave(){
    if(level%10===0) spawnEnemy(true);
    else for(let i=0;i<waveSize;i++) spawnEnemy();
}

// SHOOT BULLET
function shootBullet(){
    if(choosingAbility || !canShoot) return;
    canShoot=false; shootTimer=shootCooldown;
    let angle=Math.atan2(mouseY-player.y,mouseX-player.x);
    bullets.push({x:player.x,y:player.y,angle:angle,speed:7,damage:player.damage});
}

// UPDATE
function update(){
    if(player.health<=0) return;

    if(!canShoot){shootTimer-=16;if(shootTimer<=0) canShoot=true;}

    if(!choosingAbility){
        if(keys["w"]) player.y-=player.speed;
        if(keys["s"]) player.y+=player.speed;
        if(keys["a"]) player.x-=player.speed;
        if(keys["d"]) player.x+=player.speed;
    }

    player.x=Math.max(player.r,Math.min(canvas.width-player.r,player.x));
    player.y=Math.max(player.r,Math.min(canvas.height-player.r,player.y));

    // Bullets
    bullets.forEach((b,i)=>{
        b.x+=Math.cos(b.angle)*b.speed;
        b.y+=Math.sin(b.angle)*b.speed;
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i,1);
    });

    // Enemies
    for(let i=enemies.length-1;i>=0;i--){
        let e=enemies[i];
        if(!choosingAbility){
            let dx=player.x-e.x, dy=player.y-e.y, dist=Math.hypot(dx,dy);
            e.x+=dx/dist*e.speed;
            e.y+=dy/dist*e.speed;
            if(dist<player.r+e.r) player.health-=0.3;
        }

        // Boss spike attack
        if(e.boss){
            e.spikeTimer--;
            if(e.spikeTimer<=0){
                for(let angle=0;angle<Math.PI*2;angle+=Math.PI/6){
                    spikes.push({x:e.x,y:e.y,angle,speed:3,damage:5});
                }
                e.spikeTimer=90;
            }
        }

        // Status effects
        if(e.burnTimer>0){ e.hp-=0.05*player.damage; e.burnTimer--; }
        if(e.slowTimer>0){ e.slowTimer--; } else { e.speed=e.originalSpeed; }

        // Bullet collision
        bullets.forEach((b,j)=>{
            if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
                e.hp-=b.damage;
                if(Math.random()<0.5) e.burnTimer=60;
                if(Math.random()<0.3){e.slowTimer=60;e.speed=e.originalSpeed*0.5;}
                bullets.splice(j,1);
                // particles
                particles.push({x:e.x,y:e.y,dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2,life:20});
            }
        });

        if(e.hp<=0){player.score++; enemies.splice(i,1);}
    }

    // Spikes
    for(let i=spikes.length-1;i>=0;i--){
        let s=spikes[i];
        s.x+=Math.cos(s.angle)*s.speed;
        s.y+=Math.sin(s.angle)*s.speed;
        if(Math.hypot(player.x-s.x,player.y-s.y)<player.r){player.health-=s.damage; spikes.splice(i,1);}
        else if(s.x<0||s.x>canvas.width||s.y<0||s.y>canvas.height) spikes.splice(i,1);
    }

    // Particles
    for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.dx;p.y+=p.dy;p.life--; if(p.life<=0)particles.splice(i,1);}

    // Level complete
    if(enemies.length===0 && !waiting){
        waiting=true;
        document.getElementById("levelComplete").style.display="block";
        setTimeout(()=>{
            document.getElementById("levelComplete").style.display="none";
            chooseAbility();
            level++; waveSize+=2; enemyHPMultiplier*=1.1;
            if(level%5===0) player.health=Math.min(player.maxHealth,player.health+30);
            spawnWave();
            waiting=false;
        },2000);
    }

    document.getElementById("healthfill").style.width=(player.health/player.maxHealth*100)+"%";
    document.getElementById("score").textContent="Score: "+player.score;
    document.getElementById("level").textContent="Level: "+level;

    if(player.health<=0) gameOver();
}

// DRAW
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Particles
    particles.forEach(p=>{ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();});

    // Player
    ctx.fillStyle="blue"; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();

    // Bullets
    bullets.forEach(b=>{ctx.fillStyle="yellow"; ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();});

    // Spikes
    spikes.forEach(s=>{ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(s.x,s.y,5,0,Math.PI*2); ctx.fill();});

    // Enemies
    enemies.forEach(e=>{
        ctx.fillStyle=e.boss?"purple":"red";
        ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
        if(e.boss){
            let barWidth=60, barHeight=8;
            let hpPercent=e.hp/((30+level*5)*enemyHPMultiplier*60);
            ctx.fillStyle="black"; ctx.fillRect(e.x-barWidth/2,e.y-e.r-15,barWidth,barHeight);
            ctx.fillStyle="lime"; ctx.fillRect(e.x-barWidth/2,e.y-e.r-15,barWidth*hpPercent,barHeight);
            ctx.strokeStyle="white"; ctx.strokeRect(e.x-barWidth/2,e.y-e.r-15,barWidth,barHeight);
        }
    });

    // Diagonal leaderboard
    let board=JSON.parse(localStorage.getItem("leaderboard")||"[]").slice(0,10);
    ctx.font="16px Arial"; ctx.fillStyle="white";
    for(let i=0;i<board.length;i++){
        ctx.fillText(`${i+1}. ${board[i].name} - ${board[i].score}`,canvas.width-200+i*10,30+i*20);
    }
}

// GAME OVER & LEADERBOARD
function gameOver(){document.getElementById("deathScreen").style.display="block";}
function saveScore(){
    let name=document.getElementById("nameInput").value;
    if(name.length<3||name.length>15){alert("3-15 chars"); return;}
    let board=JSON.parse(localStorage.getItem("leaderboard")||"[]");
    board.push({name:name,score:player.score});
    board.sort((a,b)=>b.score-a.score); // highest score first
    board=board.slice(0,10);
    localStorage.setItem("leaderboard",JSON.stringify(board));
