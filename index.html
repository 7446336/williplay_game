<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arena Shooter: Epic Edition</title>
<style>
body { margin:0; background:#111; font-family:Arial; overflow:hidden; }
canvas { display:block; margin:auto; background:#222; }
#ui { position:absolute; top:10px; left:10px; color:white; }
#healthbar { width:200px; height:20px; border:2px solid white; margin-bottom:5px; }
#healthfill { width:100%; height:100%; background:red; }
#score,#level { font-size:18px; margin-top:5px; }
#levelComplete,#abilitySelect,#deathScreen {
  position:absolute; color:white; text-align:center; display:none;
}
#levelComplete { top:40%; left:50%; transform:translate(-50%,-50%); font-size:40px; }
#abilitySelect { top:40%; left:50%; transform:translate(-50%,-50%); }
button { padding:10px 15px; margin:5px; font-size:16px; }
</style>
</head>
<body>

<canvas id="game" width="900" height="600"></canvas>

<div id="ui">
  <div id="healthbar"><div id="healthfill"></div></div>
  <div id="score">Score: 0</div>
  <div id="level">Level: 1</div>
</div>

<div id="levelComplete">LEVEL COMPLETE</div>

<div id="abilitySelect">
  <h2>Choose Ability</h2>
  <div id="abilityButtons"></div>
</div>

<div id="deathScreen">
  <h1>You Died</h1>
  <input id="nameInput" placeholder="Name 3-15 chars"><br><br>
  <button onclick="saveScore()">Save Score</button>
  <button onclick="skipName()">No</button>
  <div id="afterButtons" style="display:none">
    <button onclick="restart()">Restart</button>
    <button onclick="showLeaderboard()">Leaderboards</button>
  </div>
  <div id="leaderboard"></div>
</div>

<script>
// --- Setup ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let mouse = {x:0,y:0,down:false};
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener("mousedown", ()=>mouse.down=true);
canvas.addEventListener("mouseup", ()=>mouse.down=false);

// --- Player & Game ---
let player = {x:450, y:300, r:18, speed:3, health:100, maxHealth:100, damage:10, score:0};
let bullets = [], enemies = [], level=1, waveSize=5, waiting=false;
let shootCooldown=200, shootTimer=0;
let choosingAbility=false;

// --- Abilities ---
const abilities = [
  {name:"Extra Damage",desc:"+3 Damage",effect:()=>player.damage+=3,color:"white"},
  {name:"Speed Boost",desc:"+1 Speed",effect:()=>player.speed+=1,color:"white"},
  {name:"Extra Health",desc:"+10 Max Health",effect:()=>{player.maxHealth+=10; player.health+=10},color:"white"},
  {name:"Rapid Fire",desc:"Shoot faster",effect:()=>shootCooldown=100,color:"white"}
];

// --- Shooting ---
function shootBullet() {
  if(choosingAbility || shootTimer>0) return;
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  bullets.push({x:player.x,y:player.y,angle:angle,speed:7,damage:player.damage});
  shootTimer = shootCooldown;
}

// --- Spawn Enemies ---
function spawnEnemy() {
  let x=Math.random()*canvas.width, y=Math.random()*canvas.height;
  enemies.push({x,y,r:15,hp:30+level*5,speed:1.5});
}
function spawnWave() {
  for(let i=0;i<waveSize;i++) spawnEnemy();
}

// --- Abilities Selection ---
function chooseAbility() {
  choosingAbility=true;
  const abilityDiv = document.getElementById("abilitySelect");
  const buttonsDiv = document.getElementById("abilityButtons");
  abilityDiv.style.display="block";
  buttonsDiv.innerHTML="";
  const options=[abilities[Math.floor(Math.random()*abilities.length)],
                 abilities[Math.floor(Math.random()*abilities.length)],
                 abilities[Math.floor(Math.random()*abilities.length)]];
  options.forEach(a=>{
    const btn = document.createElement("button");
    btn.textContent = `${a.name}: ${a.desc}`;
    btn.style.color = a.color;
    btn.onclick = ()=>{
      a.effect();
      abilityDiv.style.display="none";
      choosingAbility=false;
    };
    buttonsDiv.appendChild(btn);
  });
}

// --- Update ---
function update() {
  if(player.health<=0) return;
  shootTimer-=16;

  if(keys["w"]) player.y-=player.speed;
  if(keys["s"]) player.y+=player.speed;
  if(keys["a"]) player.x-=player.speed;
  if(keys["d"]) player.x+=player.speed;

  player.x=Math.max(player.r,Math.min(canvas.width-player.r,player.x));
  player.y=Math.max(player.r,Math.min(canvas.height-player.r,player.y));

  // Shooting
  if(mouse.down) shootBullet();

  // Bullets
  bullets.forEach((b,i)=>{
    b.x+=Math.cos(b.angle)*b.speed;
    b.y+=Math.sin(b.angle)*b.speed;
    enemies.forEach((e,j)=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
        e.hp-=b.damage;
        bullets.splice(i,1);
      }
    });
    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i,1);
  });

  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    let dx=player.x-e.x, dy=player.y-e.y, dist=Math.hypot(dx,dy);
    e.x+=dx/dist*e.speed;
    e.y+=dy/dist*e.speed;
    if(dist<player.r+e.r) player.health-=0.5;
    if(e.hp<=0){enemies.splice(i,1); player.score++;}
  }

  // Level complete
  if(enemies.length===0 && !waiting){
    waiting=true;
    document.getElementById("levelComplete").style.display="block";
    setTimeout(()=>{
      document.getElementById("levelComplete").style.display="none";
      chooseAbility();
      level++; waveSize+=2;
      spawnWave();
      waiting=false;
    },1000);
  }

  document.getElementById("score").textContent="Score: "+player.score;
  document.getElementById("level").textContent="Level: "+level;
  document.getElementById("healthfill").style.width=(player.health/player.maxHealth*100)+"%";
}

// --- Draw ---
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Player
  ctx.fillStyle="blue";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();
  // Bullets
  bullets.forEach(b=>{
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(b.x,b.y,4,0,Math.PI*2);
    ctx.fill();
  });
  // Enemies
  enemies.forEach(e=>{
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();
  });
}

// --- Game Loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Leaderboard ---
function saveScore() {
  const name = document.getElementById("nameInput").value;
  if(name.length<3||name.length>15){alert("3-15 chars"); return;}
  let board = JSON.parse(localStorage.getItem("leaderboard")||"[]");
  board.push({name,score:player.score});
  board.sort((a,b)=>b.score-a.score);
  localStorage.setItem("leaderboard",JSON.stringify(board.slice(0,10)));
  restart();
}
function skipName(){document.getElementById("deathScreen").style.display="none"; restart();}
function restart(){player={x:450,y:300,r:18,speed:3,health:100,maxHealth:100,damage:10,score:0};level=1;waveSize=5;enemies=[];bullets=[];spawnWave();}

spawnWave();
gameLoop();
</script>

</body>
</html>
